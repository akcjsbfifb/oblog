version: '3.8'

services:
  oblog:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - vault_data:/app/vault
      - oblog_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - VAULT_PATH=/app/vault
      - DATA_PATH=/app/data
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-30d}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GIT_REPO_URL=${GIT_REPO_URL}
      - GIT_BRANCH=${GIT_BRANCH:-main}
      - SSH_KEY_PATH=${SSH_KEY_PATH:-/app/data/ssh/key}
      - CACHE_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: nginx for SSL termination if Coolify isn't handling it
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt
    depends_on:
      - oblog
    restart: unless-stopped
    profiles:
      - with-nginx

volumes:
  vault_data:
  oblog_data:
  certbot_data:
