{{#error}}
<div class="callout callout-danger" style="margin-bottom:1rem">
  <div class="callout-title">Error</div>
  {{error}}
</div>
{{/error}}

<div>
  <h2>Login</h2>
  <form method="post" action="/login">
    {{#redirect}}
    <input type="hidden" name="redirect" value="{{redirect}}">
    {{/redirect}}
    <div style="margin-bottom:1.5rem">
      <label for="password" style="display:block;margin-bottom:.25rem;color:#a6adc8">Password</label>
      <input type="password" id="password" name="password" required
        style="width:100%;padding:.5rem;background:#11111b;border:1px solid #45475a;border-radius:6px;color:#cdd6f4;font-size:1rem">
    </div>
    <button type="submit"
      style="width:100%;padding:.6rem;background:#89b4fa;color:#1e1e2e;border:none;border-radius:6px;font-size:1rem;font-weight:600;cursor:pointer">
      Sign in
    </button>
  </form>
</div>
