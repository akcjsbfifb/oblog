<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
  <title>{{title}} - Oblog</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <style>
    :root {
      --bg: #1e1e2e;
      --bg-alt: #181825;
      --bg-sidebar: #11111b;
      --fg: #cdd6f4;
      --fg-muted: #a6adc8;
      --fg-dim: #6c7086;
      --border: #313244;
      --accent: #89b4fa;
      --green: #a6e3a1;
      --red: #f38ba8;
      --yellow: #f9e2af;
      --purple: #cba6f7;
      --teal: #89dceb;
      --radius: 6px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;line-height:1.7;min-height:100vh;min-height:100dvh}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    code{font-family:'JetBrains Mono','Fira Code',monospace;font-size:.85em;background:var(--border);padding:.1em .3em;border-radius:4px}
    pre.hljs code{background:transparent;padding:0}
    h1,h2,h3,h4,h5,h6{color:var(--fg);margin:1.5rem 0 .75rem}
    h1{font-size:1.8rem;border-bottom:1px solid var(--border);padding-bottom:.5rem}
    h2{font-size:1.4rem}h3{font-size:1.15rem}
    p{margin:.75rem 0}
    blockquote{border-left:3px solid var(--accent);padding:.5rem 1rem;margin:.75rem 0;background:var(--bg-alt);color:var(--fg-muted)}
    pre.hljs{background:var(--bg-sidebar);border-radius:8px;padding:1rem;overflow-x:auto;font-size:.85rem;margin:.75rem 0}
    img{max-width:100%;height:auto;border-radius:var(--radius);margin:.5rem 0}
    table{border-collapse:collapse;width:100%;margin:.75rem 0;font-size:.9rem}
    th,td{border:1px solid #45475a;padding:.4rem .6rem;text-align:left}
    th{background:var(--border)}
    hr{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
    .callout{border-left:3px solid;border-radius:0 6px 6px 0;padding:.75rem 1rem;margin:.75rem 0;background:var(--bg-alt)}
    .callout-title{font-weight:700;margin-bottom:.25rem}
    .callout-note{border-color:var(--accent)}.callout-note .callout-title{color:var(--accent)}
    .callout-warning{border-color:var(--yellow)}.callout-warning .callout-title{color:var(--yellow)}
    .callout-danger{border-color:var(--red)}.callout-danger .callout-title{color:var(--red)}
    .callout-tip{border-color:var(--green)}.callout-tip .callout-title{color:var(--green)}
    .callout-info{border-color:var(--teal)}.callout-info .callout-title{color:var(--teal)}
    .callout-example{border-color:var(--purple)}.callout-example .callout-title{color:var(--purple)}
    .login-form{max-width:400px;margin:3rem auto}
    .login-form h2{margin-bottom:1rem}
    .login-form label{display:block;margin-bottom:.25rem;color:var(--fg-muted);font-size:.9rem}
    .login-form input[type=text],.login-form input[type=password]{width:100%;padding:.5rem .75rem;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg);font-size:1rem;margin-bottom:1rem}
    .login-form input:focus{outline:none;border-color:var(--accent)}
    .login-form button{width:100%;padding:.6rem;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-size:1rem;font-weight:600;cursor:pointer}
    .login-form button:hover{opacity:.9}
  </style>
  {{head}}
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:2rem">
  <div style="width:100%;max-width:420px">
    {{{content}}}
  </div>
  {{scripts}}
</body>
</html>
